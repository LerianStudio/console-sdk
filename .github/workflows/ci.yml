name: ci

on:
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '.gitignore'
      - '**/*.env'
      - '*.env'
      - '**/*.md'
      - '*.md'
      - '**/*.txt'
      - '*.txt'

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which packages have changed
  get-changed-paths:
    name: Get Changed Paths
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed paths
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1.18.1
        with:
          filter-paths: |
            packages/sindarian-server
            packages/sindarian-ui
            packages/sindarian-logs
            packages/sindarian-i18n-cli
          path-level: '2'
          get-app-name: 'true'

  # Lint changed packages
  lint:
    name: Lint ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ matrix.name }}
        run: npx turbo lint --filter=@lerianstudio/${{ matrix.name }}

  # Run unit tests for changed packages
  test:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.name }}
        run: npm run test -- --filter=@lerianstudio/${{ matrix.name }}

  # Build changed packages to catch compilation errors
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.name }}
        run: npm run build -- --filter=@lerianstudio/${{ matrix.name }}

name: release

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '.gitignore'
      - '**/*.env' # Ignores all .env files
      - '*.env' # Ignores .env files in the root directory
      - '**/*.md' # Ignores all .md files
      - '*.md' # Ignores .md files in the root directory
      - '**/*.txt' # Ignores all .txt files
      - '*.txt' # Ignores .txt files in the root directory
    tags-ignore: ['**']
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: 'Package to release'
        options:
          - sindarian-server
          - sindarian-ui
          - all

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # Detect which packages have changed
  get-changed-paths:
    if: github.actor != 'lerian-studio-midaz-push-bot[bot]'
    name: Get Changed Paths
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed paths
        id: changed-paths
        uses: LerianStudio/github-actions-changed-paths@main
        with:
          filter_paths: packages/
          get_app_name: true
          path_level: 2

  npm-audit:
    name: Run npm audit and fix vulnerabilities
    needs: get-changed-paths
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run npm audit (non-blocking)
        run: |
          echo "🔍 Running npm audit with moderate threshold..."
          npm audit --omit=dev --audit-level=moderate || echo "🟡 Vulnerabilities found, but audit did not block pipeline"

      - name: Attempt to fix vulnerabilities
        run: npm audit fix || echo "ℹ️ No fixable vulnerabilities or none needed"

  # Run tests for changed packages
  test:
    name: 🧪 Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.name }}
        run: npm run test -- --filter=@lerianstudio/${{ matrix.name }}

  test-e2e:
    name: 🧪 Test E2E ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests for ${{ matrix.name }}
        run: npm run test:e2e -- --filter=@lerianstudio/${{ matrix.name }}

  # Release packages sequentially to avoid Git conflicts
  release:
    name: 🚀 Release ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [get-changed-paths, npm-audit, test, test-e2e]
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      max-parallel: 1  # Force sequential execution
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private_key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@lerianstudio'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Refresh Git state to avoid conflicts
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

      - name: Build ${{ matrix.name }}
        run: npm run build -- --filter=@lerianstudio/${{ matrix.name }}

      - name: Create package-specific semantic-release config
        run: |
          cat > .releaserc.yml << EOF
          plugins:
            - path: "@semantic-release/commit-analyzer"
              preset: conventionalcommits
              parserOpts:
                noteKeywords:
                  - "BREAKING CHANGE"
                  - "BREAKING CHANGES"
              releaseRules:
                - type: feat
                  release: minor
                - type: perf
                  release: minor
                - type: build
                  release: minor
                - type: chore
                  release: patch
                - type: ci
                  release: patch
                - type: test
                  release: patch
                - type: fix
                  release: patch
                - type: refactor
                  release: minor
                - type: docs
                  release: patch
                - breaking: true
                  release: major

            - path: "@semantic-release/release-notes-generator"
              preset: conventionalcommits

            - path: "@semantic-release/changelog"
              changelogFile: packages/${{ matrix.name }}/CHANGELOG.md

            - path: "@semantic-release/npm"
              pkgRoot: packages/${{ matrix.name }}

            - path: "@semantic-release/git"
              assets:
                - packages/${{ matrix.name }}/package.json
                - packages/${{ matrix.name }}/CHANGELOG.md
              message: "chore(${{ matrix.name }}): release v\${nextRelease.version} [skip ci]\n\n\${nextRelease.notes}"

            - path: "@semantic-release/github"
              assets:
                - path: packages/${{ matrix.name }}/CHANGELOG.md
                  label: "Changelog"
              successComment: false
              failComment: false
              labels: []

            - path: "@semantic-release/exec"

          branches:
            - name: main
            - name: develop
              prerelease: beta
            - name: hotfix/*
              prerelease: false
              channel: false

          tagFormat: ${{ matrix.name }}-v\${version}
          EOF

      - name: Install missing plugin @semantic-release/exec
        run: npm install --save-dev @semantic-release/exec

      - name: Run Semantic Release for ${{ matrix.name }}
        uses: cycjimmy/semantic-release-action@v4
        with:
          ci: false
          semantic_version: 23.0.8
          extra_plugins: |
            conventional-changelog-conventionalcommits@v7.0.2
            @saithodev/semantic-release-backmerge
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}

  generate-changelog:
    name: 📝 Generate AI-powered Changelog
    runs-on: ubuntu-latest
    needs: [get-changed-paths, release]
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - uses: LerianStudio/github-actions-gptchangelog/helm-repo@chart
        with:
          WORK_DIR: packages/${{ matrix.name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LERIAN_CI_CD_USER_GPG_KEY: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY }}
          LERIAN_CI_CD_USER_GPG_KEY_PASSWORD: ${{ secrets.LERIAN_CI_CD_USER_GPG_KEY_PASSWORD }}
          LERIAN_CI_CD_USER_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          LERIAN_CI_CD_USER_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}
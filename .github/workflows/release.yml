name: release

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '.gitignore'
      - '**/*.env'
      - '*.env'
      - '**/*.md'
      - '*.md'
      - '**/*.txt'
      - '*.txt'
    tags-ignore: ['**']
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: 'Package to release'
        options:
          - sindarian-server
          - sindarian-ui
          - sindarian-logs
          - all

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # Detect which packages have changed
  get-changed-paths:
    if: github.actor != 'lerian-studio-midaz-push-bot[bot]'
    name: Get Changed Paths
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-paths.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed paths
        id: changed-paths
        uses: LerianStudio/github-actions-shared-workflows/src/config/changed-paths@v1.18.1
        with:
          filter-paths: |
            packages/sindarian-server
            packages/sindarian-ui
            packages/sindarian-logs
          path-level: '2'
          get-app-name: 'true'

  npm-audit:
    name: Run npm audit
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=moderate || true

  # Run tests for changed packages
  test:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.name }}
        run: npm run test -- --filter=@lerianstudio/${{ matrix.name }}

  test-e2e:
    name: Test E2E ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: get-changed-paths
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests for ${{ matrix.name }}
        run: npm run test:e2e -- --filter=@lerianstudio/${{ matrix.name }}

  # Release packages sequentially to avoid Git conflicts
  release:
    name: Release ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [get-changed-paths, npm-audit, test, test-e2e]
    if: needs.get-changed-paths.outputs.matrix != '[]'
    strategy:
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.get-changed-paths.outputs.matrix) }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
          private-key: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@lerianstudio'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Refresh Git state to avoid conflicts
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

      - name: Build ${{ matrix.name }}
        run: npm run build -- --filter=@lerianstudio/${{ matrix.name }}

      - name: Create package-specific semantic-release config
        run: |
          cat > .releaserc.yml << EOF
          plugins:
            - path: "@semantic-release/commit-analyzer"
              preset: conventionalcommits
              parserOpts:
                noteKeywords:
                  - "BREAKING CHANGE"
                  - "BREAKING CHANGES"
              releaseRules:
                - type: feat
                  release: minor
                - type: perf
                  release: minor
                - type: build
                  release: minor
                - type: chore
                  release: patch
                - type: ci
                  release: patch
                - type: test
                  release: patch
                - type: fix
                  release: patch
                - type: refactor
                  release: minor
                - type: docs
                  release: patch
                - breaking: true
                  release: major

            - path: "@semantic-release/release-notes-generator"
              preset: conventionalcommits

            - path: "@semantic-release/changelog"
              changelogFile: packages/${{ matrix.name }}/CHANGELOG.md

            - path: "@semantic-release/npm"
              pkgRoot: packages/${{ matrix.name }}

            - path: "@semantic-release/git"
              assets:
                - packages/${{ matrix.name }}/package.json
                - packages/${{ matrix.name }}/CHANGELOG.md
              message: "chore(${{ matrix.name }}): release v\${nextRelease.version} [skip ci]\n\n\${nextRelease.notes}"

            - path: "@semantic-release/github"
              assets:
                - path: packages/${{ matrix.name }}/CHANGELOG.md
                  label: "Changelog"
              successComment: false
              failComment: false
              labels: []

            - path: "@semantic-release/exec"

          branches:
            - name: main
            - name: develop
              prerelease: beta
            - name: hotfix/*
              prerelease: false
              channel: false

          tagFormat: ${{ matrix.name }}-v\${version}
          EOF

      - name: Install missing plugin @semantic-release/exec
        run: npm install --save-dev @semantic-release/exec

      - name: Run Semantic Release for ${{ matrix.name }}
        uses: cycjimmy/semantic-release-action@v4
        with:
          ci: false
          semantic_version: 23.0.8
          extra_plugins: |
            conventional-changelog-conventionalcommits@v7.0.2
            @saithodev/semantic-release-backmerge@4.0.1
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.LERIAN_CI_CD_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.LERIAN_CI_CD_USER_EMAIL }}

  # AI-powered changelog generation using shared workflow
  generate-changelog:
    name: Generate Changelog
    needs: [get-changed-paths, release]
    if: needs.get-changed-paths.outputs.matrix != '[]' && github.ref_name == 'main'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/gptchangelog.yml@v1.18.1
    with:
      runner_type: ubuntu-latest
      filter_paths: |
        packages/sindarian-server
        packages/sindarian-ui
        packages/sindarian-logs
      path_level: '2'
      stable_releases_only: true
    secrets: inherit

  # Release notification using shared workflow (Slack only)
  release-notification:
    name: Release Notification
    needs: [release, generate-changelog]
    if: always() && needs.release.result == 'success'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/release-notification.yml@v1.18.1
    with:
      product_name: Console SDK
    secrets:
      APP_ID: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.LERIAN_STUDIO_MIDAZ_PUSH_BOT_PRIVATE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
